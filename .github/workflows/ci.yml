name: Node.js CI

# This action runs on pushes and pull requests to the main/master branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # You can test against multiple Node versions here
        node-version: [18.x, 20.x]

    steps:
    # 1. Check out the repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Node.js environment
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # Change to 'yarn' or 'pnpm' if you use those instead

    # 3. Install dependencies securely
    - name: Install dependencies
      run: npm ci

    # 4. Build the Vite project
    - name: Build project
      run: npm run build

    # 5. Run tests (Uncomment the line below if you have a test script in package.json)
    # - name: Run tests
    #   run: npm test
